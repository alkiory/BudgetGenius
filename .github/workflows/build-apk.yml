name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HAS_FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICES_BASE64 }}
      HAS_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      # ── Java 21 (required by Capacitor 7 / AGP) ─────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── Android SDK ──────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle caching (faster subsequent builds) ────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Node.js + pnpm ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ── Generate build version from git ───────────────────────────────────
      - name: Generate build version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Build webClient with production API URL ──────────────────────────
      - name: Build web assets
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_CAPACITOR: "true"
          # Firebase env vars (needed for Google Login bundle)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_MEASURENT_ID: ${{ secrets.VITE_FIREBASE_MEASURENT_ID }}

      # ── Sync Capacitor (copies dist/ → android/) ─────────────────────────
      - name: Sync Capacitor
        run: pnpm --filter mobile sync

      # ── Inject Firebase Services Configuration ───────────────────────────
      - name: Inject Firebase google-services.json
        if: ${{ env.HAS_FIREBASE_SECRET != '' }}
        run: |
          echo "${{ secrets.FIREBASE_SERVICES_BASE64 }}" | base64 --decode > apps/mobile/android/app/google-services.json

      # ── Build debug APK ──────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      # ── Upload APK as artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: budgetgenius-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      # ── (Optional) Build release APK on push to main ─────────────────────
      - name: Build release APK
        if: ${{ github.ref == 'refs/heads/main' && env.HAS_KEYSTORE_SECRET != '' }}
        run: |
          # Decode the keystore from a base64-encoded secret
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          cd apps/mobile/android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        if: ${{ github.ref == 'refs/heads/main' && env.HAS_KEYSTORE_SECRET != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: budgetgenius-release
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn
