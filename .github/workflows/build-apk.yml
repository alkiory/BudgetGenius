name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HAS_FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICES_BASE64 }}
      HAS_KEYSTORE_SECRET: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      # ── Java 21 (required by Capacitor 7 / AGP) ─────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── Android SDK ──────────────────────────────────────────────────────
      # Whitelist the exact SDK packages we need for `assembleDebug` /
      # `assembleRelease` (compileSdkVersion=35 + minSdk=23). The default
      # `android-actions/setup-android@v3` install set includes `emulator`,
      # whose ~1 GB download has been failing intermittently on GitHub
      # runners since 2026-Q2 with `Error on ZipFile unknown archive`
      # (likely an incomplete archive from `dl.google.com`). We never run
      # an emulator in this job — only Gradle build — so omitting it is
      # safe. If UI tests on an emulator are added later, route them
      # through `reactivecircus/android-emulator-runner@v2` in a separate
      # job so build/UI testing stay isolated.
      #
      # `packages:` is space-separated (per the v3 action's own README);
      # commas are silently swallowed and treated as one giant token.
      # cmdline-tools;latest gives `sdkmanager` itself (needed by any
      # transitive Gradle step). platform-tools gives `adb`. build-tools
      # 35.0.0 gives aapt/d8/r8. platforms;android-35 gives the compile
      # SDK with android.jar.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "cmdline-tools;latest platform-tools build-tools;35.0.0 platforms;android-35"

      # ── Gradle caching (faster subsequent builds) ────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Node.js + pnpm ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ── Generate build version from git ───────────────────────────────────
      - name: Generate build version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Build mobile assets with production API URL ─────────────────────
      - name: Build mobile assets
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_CAPACITOR: "true"
          # Firebase env vars (needed for Google Login bundle)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_MEASURENT_ID: ${{ secrets.VITE_FIREBASE_MEASURENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_IS_MOBILE_BUILD: "true"

      # ── Sync Capacitor (copies dist/ → android/) ─────────────────────────
      # `cap sync android` re-extracts `capacitor-cordova-android-plugins.tar.gz`
      # from @capacitor/cli into apps/mobile/android/capacitor-cordova-android-
      # plugins/ ON EVERY RUN (see node_modules/@capacitor/cli/dist/android/
      # update.js lines 144 / 185). That empty Cordova-compat shim's
      # processDebugResources triggers AGP 8.7.2's sdkmanager auto-install
      # probe, which tries to fetch `extras;android;m2repository` and
      # `add-ons;addon-google_apis-google-24` (both gone since ~2024) and
      # dies. We already delete the module in apps/mobile/android/settings.gradle
      # + app/build.gradle + app/capacitor.build.gradle AND disable AGP's
      # auto-download in gradle.properties (`android.builder.sdkDownload=false`)
      # — but this step is the belt-and-suspenders cleanup right after
      # sync re-creates the directory. See the long comment blocks in
      # apps/mobile/android/settings.gradle + gradle.properties for full rationale.
      - name: Sync Capacitor
        run: pnpm --filter mobile sync

      # ── Remove Capacitor Cordova compat shim (post-sync) ──────────────────
      # Runs AFTER `pnpm --filter mobile sync` because cap sync re-extracts
      # the shim from capacitor-cordova-android-plugins.tar.gz every time
      # (see node_modules/@capacitor/cli/dist/android/update.js lines 144 / 185).
      #
      # Two separate steps (NOT one) so the `sed` ALWAYS runs even when cap
      # sync regenerates `capacitor.build.gradle` without re-extracting the
      # shim tarball — a real edge case in Capacitor 7's CLI.
      #
      # The `sed` regex is anchored to non-`/` lines (`^[^/]*apply from`) so
      # the rationale comments in `capacitor.build.gradle` (which mention the
      # string `apply from: "../capacitor-cordova-android-plugins/..."` as
      # prose documentation) are NOT stripped — only the actual offending
      # `apply from` line is removed.
      - name: Remove Capacitor Cordova compat shim (post-sync)
        if: hashFiles('apps/mobile/android/capacitor-cordova-android-plugins/build.gradle') != ''
        run: rm -rf apps/mobile/android/capacitor-cordova-android-plugins

      # Strip the auto-generated `apply from` line that @capacitor/cli re-emits
      # into `capacitor.build.gradle` (line 155 of update.js template) every
      # sync. If we left it in, Gradle would fail with `Build file
      # '.../cordova.variables.gradle' not found`. Anchored to `^[^/]*`
      # so the rationale comments in capacitor.build.gradle that mention the
      # string in prose are left untouched (see the long commentary around
      # the post-sync step above for context).
      #
      # The `test -f … && sed …` form scopes the no-op to the *missing-file*
      # edge case only — a real sed failure (bad regex, permission denied,
      # read-only filesystem) still surfaces as a workflow error, which is
      # what we want for a CI safety net. `|| true` would have masked all
      # such failures indiscriminately.
      #
      # NOTE — do NOT add `|| true` at the end of this `run:` block. Our
      # shell semantics are deliberately: missing `capacitor.build.gradle`
      # post-sync = upstream `pnpm --filter mobile sync` failed to write
      # native config = CI should turn RED on that, not silently skip.
      - name: Strip defunct apply-from line from capacitor.build.gradle (post-sync)
        run: |
          test -f apps/mobile/android/app/capacitor.build.gradle \
              && sed -i '/^[^/]*apply from.*capacitor-cordova-android-plugins/d' \
                  apps/mobile/android/app/capacitor.build.gradle

      # ── Inject Firebase Services Configuration ───────────────────────────
      - name: Inject Firebase google-services.json
        if: ${{ env.HAS_FIREBASE_SECRET != '' }}
        run: |
          echo "${{ secrets.FIREBASE_SERVICES_BASE64 }}" | base64 --decode > apps/mobile/android/app/google-services.json

      # ── Build debug APK ──────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      # ── Upload APK as artifact (name includes version) ─────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: budgetgenius-debug-${{ steps.version.outputs.version }}
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      # ── (Optional) Build release APK on push to main ─────────────────────
      - name: Build release APK
        if: ${{ github.ref == 'refs/heads/main' && env.HAS_KEYSTORE_SECRET != '' }}
        run: |
          # Decode the keystore from a base64-encoded secret
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          cd apps/mobile/android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        if: ${{ github.ref == 'refs/heads/main' && env.HAS_KEYSTORE_SECRET != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: budgetgenius-release-${{ steps.version.outputs.version }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn
