name: Playwright Tests
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright (and its browsers) live in apps/webClient, not at the
      # workspace root. Anchor both install + test steps to that package
      # so `pnpm exec playwright …` resolves the local binary; otherwise
      # the install silently no-ops and the test step throws the
      # "Executable doesn't exist at …/chrome-linux/headless_shell" error.
      - name: Install Playwright Browsers
        working-directory: apps/webClient
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        working-directory: apps/webClient
        run: pnpm exec playwright test
        env:
          VITE_API_URL: "http://localhost:5173"
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
