name: Deploy to Firebase Hosting on merge
# ── OPERATOR ACTION (Wave 1 [T1.4]) ────────────────────────────────────
# GitHub Secret VITE_FIREBASE_MEASURENT_ID was renamed to
# VITE_FIREBASE_MEASUREMENT_ID (historical typo correction). The
# build step below reads from the new name; until the platform admin
# renames the Repository Secret, the bundled measurementId reads as
# `undefined` at runtime and Firebase Analytics silently fails to
# initialize. Until the rename is in place, the workflow still emits
# a working build (CI is green) but production analytics is dead.
on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Cambiamos a Node 20 (LTS). Es la versión más estable y recomendada
          # para evitar el error "Premature close" en la librería de Google Auth.
          node-version: "20"

      - name: Generate build version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Wave 1 [T1.4]: env renamed from VITE_FIREBASE_MEASURENT_ID →
          # VITE_FIREBASE_MEASUREMENT_ID. The GitHub Secret must be
          # renamed to match. analytics tag currently delegates to
          # `measurementId` on the client (firebaseConfig.ts) — an
          # unrenamed secret leaves analytics silently uninitialised.
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGETGENIUSIA }}
          channelId: live
          projectId: budgetgeniusia
