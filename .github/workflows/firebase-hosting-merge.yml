name: Deploy to Firebase Hosting on merge
on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Cambiamos a Node 20 (LTS). Es la versión más estable y recomendada
          # para evitar el error "Premature close" en la librería de Google Auth.
          node-version: "20"

      - name: Generate build version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # v1.6.0 — Landing DownloadApp CTA. The GitHub Secret is
          # empty-string-resilient: if a deploy runs before the secret
          # is set, Vite resolves `import.meta.env.VITE_APK_DOWNLOAD_URL`
          # to "" and the download-app.tsx component's REPLACE_ME / TODO /
          # PLACEHOLDER / YOUR_ORG / YOUR_REPO token check falls back to
          # the disabled "Coming soon" state — i.e. the build still
          # succeeds, the CTA gracefully degrades. Set the secret to
          # `https://github.com/<owner>/<repo>/releases/download/<tag>/BudgetGenius-<tag>.apk`
          # once the matching GitHub Release exists.
          VITE_APK_DOWNLOAD_URL: ${{ secrets.VITE_APK_DOWNLOAD_URL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGETGENIUSIA }}
          channelId: live
          projectId: budgetgeniusia
