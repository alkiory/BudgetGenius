name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate build version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          # Firebase — necesario para Google Login con Firebase JS SDK
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASURENT_ID: ${{ secrets.VITE_FIREBASE_MEASURENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      # ── Firebase Hosting preview (with retry) ─────────────────────────
      # Three-step retry chain around `FirebaseExtended/action-hosting-deploy@v0.11.0`
      # to recover from the transient `oauth2/v4/token: Premature close`
      # failure mode of firebase-tools when it auto-refreshes the
      # service-account OAuth token. The action wraps the JSON-key
      # → OAuth swap correctly (passing the blob through `firebaseServiceAccount`
      # does NOT confuse the wrapper the way passing it through `FIREBASE_TOKEN`
      # does — `FIREBASE_TOKEN` only expects a single refresh-token string).
      #
      # Each attempt runs the same wrapper; later steps are conditionally
      # triggered on the previous one's failure. `continue-on-error: true`
      # lets the post-step propagate the failure so the next step's `if`
      # can re-run. No wall-clock sleep between attempts is not added —
      # the upstream `oauth2/v4/token` request is fast and the next
      # attempt usually hits a fresh token without a sleep.
      #
      # Pin BOTH the action AND firebase-tools version (the latter is
      # the action's default; firebase-tools 15.22.2+ started returning
      # `Premature close` reliably, 15.20.0 does not). Bump either with
      # care and re-run this workflow on a known PR to verify.

      - name: Firebase Hosting preview (1/3)
        id: deploy_1
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGETGENIUSIA }}
          projectId: budgetgeniusia
          firebaseToolsVersion: '15.20.0'

      - name: Firebase Hosting preview (2/3, retry)
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGETGENIUSIA }}
          projectId: budgetgeniusia
          firebaseToolsVersion: '15.20.0'

      - name: Firebase Hosting preview (3/3, retry)
        id: deploy_3
        if: steps.deploy_2.outcome == 'failure'
        uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGETGENIUSIA }}
          projectId: budgetgeniusia
          firebaseToolsVersion: '15.20.0'
