name: Release Android APK to GitHub Releases

# Concurrency: serialise releases per ref so two tags pushed in rapid
# succession don't race each other into the same `BudgetGenius-${tag}.apk`
# asset slot on the GitHub Releases API. `cancel-in-progress: false` so a
# second push stacks, doesn't kill the first.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-android:
    name: Build + publish APK release
    runs-on: ubuntu-latest
    env:
      HAS_FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICES_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "cmdline-tools;latest platform-tools build-tools;35.0.0 platforms;android-35"

      # ── Gradle cache (faster warm + cold builds) ───────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mobile web assets
        run: pnpm --filter frontend-web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ github.ref_name }}
          VITE_CAPACITOR: "true"
          VITE_IS_MOBILE_BUILD: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Sync Capacitor
        run: pnpm --filter mobile exec cap sync android

      - name: Remove Capacitor Cordova compat shim (post-sync)
        if: hashFiles('apps/mobile/android/capacitor-cordova-android-plugins/build.gradle') != ''
        run: rm -rf apps/mobile/android/capacitor-cordova-android-plugins

      - name: Strip defunct apply-from line from capacitor.build.gradle (post-sync)
        run: |
          test -f apps/mobile/android/app/capacitor.build.gradle \
              && sed -i '/^[^/]*apply from.*capacitor-cordova-android-plugins/d' \
                  apps/mobile/android/app/capacitor.build.gradle

      - name: Inject Firebase google-services.json
        if: ${{ env.HAS_FIREBASE_SECRET != '' }}
        run: |
          echo "${{ secrets.FIREBASE_SERVICES_BASE64 }}" | base64 --decode > apps/mobile/android/app/google-services.json
          # Decode-then-validate: if the secret has stray whitespace, partial
          # base64, or any corruption, fail fast here with a clear log marker
          # instead of bubbling a misleading Gradle error several minutes later.
          python3 -c "import json; json.load(open('apps/mobile/android/app/google-services.json'))" \
            || (echo "::error::FIREBASE_SERVICES_BASE64 decoded but is not valid JSON — re-base64 the source file and re-store the secret." && exit 1)

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK to canonical release filename
        run: |
          mv apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             "BudgetGenius-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "BudgetGenius-${{ github.ref_name }}.apk"
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            ## Download

            Tap the **BudgetGenius-${{ github.ref_name }}.apk** asset below
            to download BudgetGenius for Android.

            ## Install

            1. Save the APK to your device.
            2. Open it from your file manager (Downloads, Files, etc.).
            3. If Android warns about installing from an unknown source,
               open Settings → Apps → Special access → Install unknown
               apps and grant permission to the file manager you used.
            4. Tap Install. BudgetGenius is ready.

            ## Notes

            - This APK is signed with the standard Android debug keystore
              (same certificate as every development install). It is fine
              for personal use; a properly-signed APK will follow when the
              Play Store rollout is ready.
            - iOS — coming soon.
