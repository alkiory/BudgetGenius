name: budgetgenius-prod

services:
  backend:
    container_name: bg-backend-prod
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # ELIMINADO: block ports. NPM enrutará el tráfico internamente.
    env_file:
      - ./apps/api/.env.production
    environment:
      - PORT=5000
      - NODE_ENV=production
      - PGSSLMODE=disable 
      - DB_HOST=database
      - DB_NAME=budgetgenius_prod
      - DB_USER=postgres_admin_prod
      - DB_PASS=${DB_PASSWORD}
    networks:
      - app-network
      - npm_network   # <-- Vital: Conecta con NPM para recibir peticiones
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    container_name: bg-db-prod
    environment:
      - POSTGRES_USER=postgres_admin_prod
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=budgetgenius_prod
    networks:
      - app-network   # <-- Aislado: NPM no puede tocar la base de datos
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_admin_prod -d budgetgenius_prod"]

  redis:
    image: redis:7.2-alpine
    container_name: bg-redis-prod
    networks:
      - app-network   # <-- Aislado: NPM no puede tocar Redis
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge
  npm_network:
    external: true

volumes:
  pgdata_prod:
  redisdata_prod: